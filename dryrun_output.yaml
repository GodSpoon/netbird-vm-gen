#cloud-config
autoinstall:
  version: 1
  source:
    id: ubuntu-server-minimal
    search_drivers: false
  locale: en_US.UTF-8
  keyboard:
    layout: us
  network:
    version: 2
    ethernets:
      all-eth:
        match:
          name: "e*"
        addresses:
          - 192.168.10.50/24
        routes:
          - to: default
            via: 192.168.10.1
        nameservers:
          addresses:
            - 8.8.8.8
            - 1.1.1.1
  storage:
    layout:
      name: lvm
      sizing-policy: all
  identity:
    hostname: test-vm
    username: admin
    password: 
"$6$rounds=656000$dsKyuUtNU7rC/X94$vYCAxmGCXXFFP1ansmr3tXBkYgX94nCzdmYSgptvQhI0
64WxeXXa3kdorAOjyIH2T2TsXkg7Lx4JDvvz0cGR2."
  ssh:
    install-server: true
    allow-pw: true
  packages:
    - curl
    - wget
    - ca-certificates
    - gnupg
    - open-vm-tools
    - hyperv-daemons
  user-data:
    disable_root: true
  late-commands:
    - |
      cat > /target/opt/00-netbird.sh << 'SCRIPT'
#!/usr/bin/env bash
set -euo pipefail

# Install dependencies
apt-get install -y ca-certificates curl gnupg

# Add NetBird GPG key
mkdir -p /usr/share/keyrings
curl -fsSL https://pkgs.netbird.io/debian/public.key \
    | gpg --dearmor -o /usr/share/keyrings/netbird-archive-keyring.gpg

# Add NetBird repository
echo "deb  https://pkgs.netbird.io/debian stable main" \
    > /etc/apt/sources.list.d/netbird.list

# Install NetBird
apt-get update
apt-get install -y netbird

# Enable and start NetBird service
systemctl enable --now netbird

# Connect to NetBird
netbird up \
    --setup-key "nb-skey-test123" \
    --management-url "https://api.netbird.io" \
    --hostname "test-vm"

# Wait for connection and verify status
sleep 5
netbird status | grep -q Connected
      SCRIPT
      chmod +x /target/opt/00-netbird.sh
    - |
      cat > /target/opt/01-ninjaone.sh << 'SCRIPT'

      SCRIPT
      chmod +x /target/opt/01-ninjaone.sh
    - curtin in-target --target=/target -- /opt/00-netbird.sh
    - curtin in-target --target=/target -- /opt/01-ninjaone.sh
    - rm -f /target/opt/00-netbird.sh /target/opt/01-ninjaone.sh
  shutdown: reboot
